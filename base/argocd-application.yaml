apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-env
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AJ-Pullup/kubernetes-dev-atelier.git'
    targetRevision: HEAD
    path: overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prd-env
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AJ-Pullup/kubernetes-prd-atelier.git'
    targetRevision: HEAD
    path: overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prd-env
  syncPolicy:
    automated:
      prune: true
      selfHeal: true