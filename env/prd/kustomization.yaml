apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
bases:
- ../../base
namespace: prd-env

configMapGenerator:
- name: app-config
  behavior: replace
  literals:
  - config.json={"message":"Production environment"}

resources:
- gateway.yaml
- api-deployment.yaml
- api-service.yaml

patches:
- path: patches.yaml
