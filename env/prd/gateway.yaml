apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: prd-env
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: "gitops.local"
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gitops-api
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gitops
            port:
              number: 3000
